site_name: Ògiri Security
site_description: Token-based authentication for Spring Boot with pluggable sub-tokens.
site_url: https://quantipixels.github.io/ogiri
repo_url: https://github.com/quantipixels/ogiri
repo_name: quantipixels/ogiri
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.tabs
    - navigation.indexes
    - navigation.footer
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  ogiri_version: 2.0.0
  version:
    provider: mike
    default: latest
    alias: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/quantipixels/ogiri

plugins:
  - search:
      lang: en
      separator: '[\s\-_]+'
  - macros
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
  - redirects:
      redirect_maps: {}

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
      - Configuration: configuration.md
      - Database Integration: database.md
      - Sub-tokens: sub-tokens.md
      - Authentication Flow: authentication.md
      - React Integration: react-integration.md
  - Contributing:
      - Development Guide: development.md
      - Security Policy: security.md
  - Changelog: changelog.md

site_name: Ògiri Security
site_description: Token-based authentication for Spring Boot with pluggable sub-tokens.
site_url: https://mosobande.github.io/ogiri
repo_url: https://github.com/mosobande/ogiri
repo_name: mosobande/ogiri
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.tabs
    - toc.integrate
    - content.code.copy

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mosobande/ogiri

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
      - Configuration: configuration.md
      - Database Integration: database.md
      - Sub-tokens: sub-tokens.md
      - Authentication Flow: authentication.md
  - Contributing:
      - Development Guide: development.md
      - Contributing Guidelines: contributing.md
      - Security Policy: security.md
      - Code of Conduct: code-of-conduct.md
  - Changelog: changelog.md

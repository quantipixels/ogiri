# JitPack build configuration for Ogiri Security
# Builds both ogiri-core and ogiri-jpa modules
#
# Usage:
#   repositories {
#       maven { url = uri("https://jitpack.io") }
#   }
#   dependencies {
#       implementation("com.github.quantipixels.ogiri:ogiri-core:TAG")
#       implementation("com.github.quantipixels.ogiri:ogiri-jpa:TAG")
#   }

jdk:
  - openjdk17

before_install:
  - chmod +x gradlew

install:
  - ./gradlew clean publishToMavenLocal -x test -x spotlessCheck

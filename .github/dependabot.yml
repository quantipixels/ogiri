version: 2
updates:
  # Gradle dependencies and plugins
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "quantipixels"
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
    open-pull-requests-limit: 5
    reviewers:
      - "quantipixels"
    labels:
      - "dependencies"
      - "ci/cd"
    commit-message:
      prefix: "ci:"
      include: "scope"

name: Lint

on:
  push:
    branches: [ ori ]
  pull_request:
    branches: [ ori ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: gradle

      - name: Check code formatting with Spotless
        run: ./gradlew spotlessCheck --no-daemon

      - name: Show formatting violations (if any)
        if: failure()
        run: |
          echo "::error::Code formatting violations detected. Run 'gradlew spotlessApply' locally to fix."
          ./gradlew spotlessApply --no-daemon
          echo ""
          echo "Expected changes:"
          git diff --color=always || true

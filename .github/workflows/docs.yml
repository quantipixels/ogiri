name: Deploy Documentation

on:
  push:
    branches:
      - ori
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy versioned docs
        run: |
          # Determine version and whether to set as latest
          if [ "${{ github.event_name }}" == "release" ]; then
            # Release event: use release tag, set as latest
            VERSION=${{ github.event.release.tag_name }}
            VERSION=${VERSION#v}
            echo "Deploying release docs: $VERSION (latest)"
            mike deploy --push --update-aliases "$VERSION" latest
            mike set-default --push latest
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push: use tag version, set as latest
            VERSION=${{ github.ref_name }}
            VERSION=${VERSION#v}
            echo "Deploying tagged docs: $VERSION (latest)"
            mike deploy --push --update-aliases "$VERSION" latest
            mike set-default --push latest
          else
            # Branch push: use version file
            VERSION=$(cat .ogiri-version)
            echo "Deploying docs for version: $VERSION"
            mike deploy --push "$VERSION"
          fi

      - name: Verify deployment
        run: |
          echo "✓ Documentation deployed successfully"
          echo "Available at: https://mosobande.github.io/ogiri"

name: Client Test

on:
  push:
    branches: [ori, main]
    paths:
      - "ogiri-client/**"
      - ".github/workflows/client-test.yml"
  pull_request:
    branches: [ori, main]
    paths:
      - "ogiri-client/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    defaults:
      run:
        working-directory: ogiri-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: ogiri-client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run tests with coverage
        run: pnpm vitest run --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        if: matrix.node-version == 20
        with:
          files: ./ogiri-client/coverage/lcov.info
          flags: typescript-client
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: pnpm build

      - name: Check build artifacts
        run: |
          if [ ! -f dist/index.js ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi
          if [ ! -f dist/index.d.ts ]; then
            echo "Build failed: dist/index.d.ts not found"
            exit 1
          fi
          if [ ! -f dist/axios/index.js ]; then
            echo "Build failed: dist/axios/index.js not found"
            exit 1
          fi
          echo "✓ Build artifacts verified"

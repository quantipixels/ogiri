name: Snapshot Deployment

on:
  push:
    branches: [ ori ]

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: gradle

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Determine snapshot version
        id: snapshot-version
        run: |
          # Get current version and append -SNAPSHOT if not already present
          VERSION=$(grep 'projectVersion = ' settings.gradle.kts | grep -o '"[^"]*"' | tr -d '"' || echo "1.0.1")
          SNAPSHOT_VERSION="${VERSION%-SNAPSHOT}-SNAPSHOT"  # Remove existing -SNAPSHOT and re-add
          echo "VERSION=$SNAPSHOT_VERSION" >> $GITHUB_OUTPUT

      - name: Deploy snapshots to Maven Central
        run: ./gradlew publish --no-daemon
        env:
          RELEASE_VERSION: ${{ steps.snapshot-version.outputs.VERSION }}
          ORG_GRADLE_PROJECT_ossrhUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_ossrhPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_signingSecretKeyRingFile: ${{ runner.temp }}/secring.gpg

      - name: Notify snapshot deployment
        if: success()
        run: echo "✓ Snapshot deployed successfully to Maven Central"

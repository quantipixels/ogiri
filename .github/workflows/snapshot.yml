name: Snapshot Deployment

on:
  push:
    branches: [ori]

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "temurin"
          cache: gradle

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Determine snapshot version
        id: snapshot-version
        run: |
          # Try extracting from settings.gradle.kts
          VERSION=$(grep 'projectVersion =' settings.gradle.kts | grep -o '"[^"]*"' | tr -d '"' || true)

          # Fallback to .ogiri-version if extraction failed
          if [ -z "$VERSION" ] && [ -f ".ogiri-version" ]; then
            VERSION=$(cat .ogiri-version | tr -d '[:space:]')
          fi

          # Fail fast if still no version
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to resolve project version from settings.gradle.kts or .ogiri-version"
            exit 1
          fi

          SNAPSHOT_VERSION="${VERSION%-SNAPSHOT}-SNAPSHOT"
          echo "VERSION=$SNAPSHOT_VERSION" >> $GITHUB_OUTPUT

      - name: Deploy snapshots to Maven Central
        run: ./gradlew publish --no-daemon
        env:
          RELEASE_VERSION: ${{ steps.snapshot-version.outputs.VERSION }}
          ORG_GRADLE_PROJECT_ossrhUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_ossrhPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signing.key: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signing.password: ${{ secrets.GPG_PASSPHRASE }}

      - name: Notify snapshot deployment
        if: success()
        run: echo "✓ Snapshot deployed successfully to Maven Central"

# Gradle Build Configuration
# https://docs.gradle.org/current/userguide/build_environment.html

# Java Toolchain Configuration
# Gradle will automatically detect and use Java 17 via:
#   1. .java-version file (recommended - already configured with "17")
#   2. JAVA_HOME environment variable
#   3. Auto-detection from installed JDKs
# For local development with Java 25+: Set JAVA_HOME to Java 17 or use toolchain auto-detection

# Performance optimizations
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

# Kotlin compiler options
kotlin.incremental=true
kotlin.daemon.jvmargs=-Xmx2g

# Gradle Java Toolchain Detection
# Enable auto-provisioning of Java toolchains (Gradle will download Java 17 if needed)
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.auto-download=true
